# Brand prototype layer (safe mode, recommended)
# To enable locally:
#   - Keep theme.custom_dir unset (or use default theme templates)
#   - Load brand_prototype/styles/brand.safe.css as the LAST entry in extra_css
#
# Example:
# extra_css:
#   - assets/css/style.css
#   - chatbot_widget.css
#   - styles/brand.css
#   - brand_prototype/styles/brand.safe.css
#
# Test:
#   mkdocs serve
# Then hard refresh and confirm rules are sourced from
# brand_prototype/styles/brand.safe.css in DevTools.
