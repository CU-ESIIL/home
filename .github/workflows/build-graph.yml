name: Build ESIIL Graph

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-graph:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Discover CU-ESIIL repositories
        if: ${{ env.GH_TOKEN != '' }}
        run: python scripts/discover_org_repos.py
      - name: Build graph
        run: python scripts/build_graph.py
      - name: Run graph tests
        run: pytest tests/test_build_graph.py
      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: esiil-graph
          path: |
            docs/assets/data/esiil_graph.json
            docs/explore/themes/
